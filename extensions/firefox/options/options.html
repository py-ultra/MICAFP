<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UnifiedShield — Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="options-container">
    <header class="header">
      <h1>UnifiedShield Settings</h1>
      <span class="version">v2.0.0</span>
    </header>

    <section class="section">
      <h2 class="section-title">Connection</h2>
      <div class="form-group">
        <label for="socksHost">SOCKS5 Host</label>
        <input type="text" id="socksHost" placeholder="127.0.0.1" />
      </div>
      <div class="form-group">
        <label for="socksPort">SOCKS5 Port</label>
        <input type="number" id="socksPort" placeholder="1080" min="1" max="65535" />
      </div>
      <div class="form-group">
        <div class="toggle-row">
          <label for="socksEnabled">SOCKS5 Proxy Enabled</label>
          <input type="checkbox" id="socksEnabled" />
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">DNS-over-HTTPS</h2>
      <div class="form-group">
        <div class="toggle-row">
          <label for="dohEnabled">Enable DoH</label>
          <input type="checkbox" id="dohEnabled" />
        </div>
        <p class="help-text">Bypass ISP DNS poisoning (Chinese CDN servers used by default)</p>
      </div>
      <div class="doh-servers">
        <label class="check-item">
          <input type="checkbox" data-doh="alidns" checked />
          <span>Alidns (dns.alidns.com)</span>
          <span class="badge chinese">CN</span>
        </label>
        <label class="check-item">
          <input type="checkbox" data-doh="dnspod" checked />
          <span>DNSPod (doh.pub)</span>
          <span class="badge chinese">CN</span>
        </label>
        <label class="check-item">
          <input type="checkbox" data-doh="quad9" />
          <span>Quad9 (dns.quad9.net)</span>
        </label>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Advanced</h2>
      <div class="form-group">
        <div class="toggle-row">
          <label for="autoStart">Auto-start on browser launch</label>
          <input type="checkbox" id="autoStart" />
        </div>
      </div>
      <div class="form-group">
        <label for="preferredMode">Preferred Mode</label>
        <select id="preferredMode">
          <option value="auto">Auto</option>
          <option value="socks5">SOCKS5 Only</option>
          <option value="direct">Direct</option>
        </select>
      </div>
    </section>

    <div class="actions-bar">
      <button class="btn btn-secondary" id="resetBtn">Reset Defaults</button>
      <button class="btn btn-primary" id="saveBtn">Save Settings</button>
    </div>

    <div class="status-bar" id="statusBar">
      <span id="statusMessage"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
