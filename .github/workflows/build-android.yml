name: Build Android
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Android NDK r27c
        run: |
          ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Build Rust daemon for Android
        run: |
          cd daemon
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 -t x86 build --release --lib
      - name: Copy .so files
        run: |
          mkdir -p android/app/jniLibs/arm64-v8a android/app/jniLibs/armeabi-v7a
          mkdir -p android/app/jniLibs/x86_64 android/app/jniLibs/x86
          cp daemon/target/aarch64-linux-android/release/libunifiedshield.so android/app/jniLibs/arm64-v8a/
          cp daemon/target/armv7-linux-androideabi/release/libunifiedshield.so android/app/jniLibs/armeabi-v7a/
          cp daemon/target/x86_64-linux-android/release/libunifiedshield.so android/app/jniLibs/x86_64/
          cp daemon/target/i686-linux-android/release/libunifiedshield.so android/app/jniLibs/x86/
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with: {java-version: "21", distribution: temurin}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease
      - name: Build AAB
        working-directory: android
        run: ./gradlew bundleRelease
      - name: Sign APK
        if: startsWith(github.ref, \'refs/tags/v\')
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          # jarsigner signing would go here
      - name: Generate checksums
        run: |
          find android/app/build/outputs -name "*.apk" -o -name "*.aab" | while read f; do
            sha256sum "$f" > "$f.sha256"
          done
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            android/app/build/outputs/**/*.apk
            android/app/build/outputs/**/*.aab
            android/app/build/outputs/**/*.sha256
