name: Build & Release — VIP-ULTRA Quantum-Ultra v8.0

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Lint & Check ──────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt
        run: cd daemon && cargo fmt --check
      - name: cargo clippy
        run: cd daemon && cargo clippy --all-targets --features full -- -D warnings

  # ── Daemon Tests ──────────────────────────────────────────────────────────
  test:
    name: Daemon Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
      - name: Run tests
        run: cd daemon && cargo test --features full

  # ── Linux Build ───────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux (x86_64 + aarch64 musl)
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@cross
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
      - name: Build daemon
        run: cd daemon && cross build --target ${{ matrix.target }} --release --features platform-linux
      - uses: actions/upload-artifact@v4
        with:
          name: shield-daemon-linux-${{ matrix.target }}
          path: daemon/target/${{ matrix.target }}/release/shield-daemon

  # ── Android Build ─────────────────────────────────────────────────────────
  build-android:
    name: Build Android (arm64 + armv7 + x86_64)
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi
          - x86_64-linux-android
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@cross
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
      - name: Build daemon
        run: cd daemon && cross build --target ${{ matrix.target }} --release --features platform-android
      - uses: actions/upload-artifact@v4
        with:
          name: shield-daemon-android-${{ matrix.target }}
          path: daemon/target/${{ matrix.target }}/release/shield-daemon

  # ── iOS Build ─────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS (aarch64)
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
      - name: Build daemon
        run: cd daemon && cargo build --target aarch64-apple-ios --release --features platform-ios
      - uses: actions/upload-artifact@v4
        with:
          name: shield-daemon-ios-aarch64
          path: daemon/target/aarch64-apple-ios/release/libshield_daemon.a

  # ── Windows Build ─────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (x86_64)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - uses: taiki-e/install-action@cross
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
      - name: Build daemon
        run: cd daemon && cross build --target x86_64-pc-windows-gnu --release --features platform-windows
      - uses: actions/upload-artifact@v4
        with:
          name: shield-daemon-windows-x86_64
          path: daemon/target/x86_64-pc-windows-gnu/release/shield-daemon.exe

  # ── OpenWrt Build ─────────────────────────────────────────────────────────
  build-openwrt:
    name: Build OpenWrt (MIPS musl)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: mipsel-unknown-linux-musl
      - uses: taiki-e/install-action@cross
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
      - name: Build daemon
        run: cd daemon && cross build --target mipsel-unknown-linux-musl --release --features platform-openwrt
      - uses: actions/upload-artifact@v4
        with:
          name: shield-daemon-openwrt-mipsel
          path: daemon/target/mipsel-unknown-linux-musl/release/shield-daemon

  # ── Chrome Extension ──────────────────────────────────────────────────────
  build-chrome:
    name: Build Chrome Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Build extension
        run: |
          cd extensions/chrome && pnpm install && pnpm build || true
      - uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: extensions/chrome/dist/

  # ── Firefox Extension ─────────────────────────────────────────────────────
  build-firefox:
    name: Build Firefox Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Build extension
        run: |
          cd extensions/firefox && pnpm install && pnpm build || true
      - uses: actions/upload-artifact@v4
        with:
          name: firefox-extension
          path: extensions/firefox/dist/

  # ── Release ───────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-linux
      - build-android
      - build-windows
      - build-openwrt
      - build-chrome
      - build-firefox
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          name: "MICAFP-UnifiedShield-vip-ultra-Quantum-ultra ${{ github.ref_name }}"
